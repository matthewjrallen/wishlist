<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Wishlist</title>

  <!-- PWA / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wishlist" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Playfair Display', 'serif'],
            body: ['DM Sans', 'sans-serif'],
          },
          colors: {
            ink: '#0a0a0a',
            paper: '#f5f0eb',
            accent: '#c8a96e',
            muted: '#6b6560',
          },
        },
      },
    };
  </script>

  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', sans-serif; background: #0a0a0a; color: #f5f0eb; }

    .glass {
      background: rgba(245,240,235,0.04);
      border: 1px solid rgba(245,240,235,0.10);
      backdrop-filter: blur(12px);
    }
    .accent-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, #c8a96e, transparent);
    }
    input, textarea, select {
      background: rgba(245,240,235,0.06) !important;
      border: 1px solid rgba(245,240,235,0.15) !important;
      color: #f5f0eb !important;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #c8a96e !important;
    }
    input::placeholder, textarea::placeholder { color: #6b6560; }
    select option { background: #1a1a1a; }

    .btn-primary {
      background: #c8a96e;
      color: #0a0a0a;
      font-weight: 500;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-ghost {
      border: 1px solid rgba(245,240,235,0.2);
      color: #f5f0eb;
      transition: border-color 0.2s;
    }
    .btn-ghost:hover { border-color: #c8a96e; }

    .item-card {
      background: rgba(245,240,235,0.04);
      border: 1px solid rgba(245,240,235,0.08);
      transition: border-color 0.2s, transform 0.2s;
    }
    .item-card:hover { border-color: rgba(200,169,110,0.4); transform: translateY(-1px); }

    .tag {
      background: rgba(200,169,110,0.15);
      border: 1px solid rgba(200,169,110,0.3);
      color: #c8a96e;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .slide-in { animation: slideIn 0.3s ease forwards; }
    @keyframes slideIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

    .modal-overlay {
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(8px);
    }
    .modal-box {
      background: #141414;
      border: 1px solid rgba(245,240,235,0.12);
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(10,10,10,0.3);
      border-top-color: #0a0a0a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .filter-pill {
      border: 1px solid rgba(245,240,235,0.15);
      color: #6b6560;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      transition: all 0.2s;
    }
    .filter-pill.active, .filter-pill:hover {
      border-color: #c8a96e;
      color: #c8a96e;
    }

    #toast {
      transition: opacity 0.3s, transform 0.3s;
    }
  </style>
</head>
<body class="min-h-screen">

  <!-- AUTH SCREEN -->
  <div id="authScreen" class="min-h-screen flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-sm">
      <div class="text-center mb-10">
        <h1 class="font-display text-5xl mb-2 tracking-tight">Wishlist</h1>
        <p class="text-muted text-sm">Your private collection</p>
        <div class="accent-line mt-4 mx-auto w-24"></div>
      </div>

      <div class="glass rounded-2xl p-6 space-y-4">
        <!-- Tabs -->
        <div class="flex rounded-xl overflow-hidden border border-white/10 mb-2">
          <button id="tabLogin" onclick="switchTab('login')"
            class="flex-1 py-2 text-sm font-medium transition-colors bg-white/8 text-paper">Sign In</button>
          <button id="tabRegister" onclick="switchTab('register')"
            class="flex-1 py-2 text-sm font-medium transition-colors text-muted">Register</button>
        </div>

        <div id="authError" class="text-red-400 text-xs text-center hidden"></div>

        <input id="authEmail" type="email" placeholder="Email" class="w-full rounded-xl px-4 py-3 text-sm" />
        <input id="authPassword" type="password" placeholder="Password" class="w-full rounded-xl px-4 py-3 text-sm" />

        <div id="masterPwSection" class="space-y-2">
          <input id="masterPassword" type="password" placeholder="Master Password (for encryption)" class="w-full rounded-xl px-4 py-3 text-sm" />
          <p class="text-muted text-xs leading-relaxed">This password encrypts your data client-side. It's <strong class="text-paper">never</strong> stored. Keep it safe.</p>
        </div>

        <button id="authBtn" onclick="handleAuth()" class="btn-primary w-full rounded-xl py-3 text-sm flex items-center justify-center gap-2">
          Sign In
        </button>
      </div>

      <!-- Firebase config notice -->
      <p class="text-muted text-xs text-center mt-6 leading-relaxed">
        ⚙️ Paste your Firebase config in the <code class="text-accent">FIREBASE_CONFIG</code> section below
      </p>
    </div>
  </div>

  <!-- APP SCREEN -->
  <div id="appScreen" class="hidden min-h-screen flex flex-col max-w-2xl mx-auto">

    <!-- Header -->
    <header class="px-6 pt-14 pb-4 flex items-center justify-between">
      <div>
        <h1 class="font-display text-3xl tracking-tight">Wishlist</h1>
        <p id="itemCount" class="text-muted text-xs mt-0.5">0 items</p>
      </div>
      <button onclick="signOut()" class="btn-ghost text-xs px-4 py-2 rounded-full">Sign out</button>
    </header>

    <div class="accent-line mx-6"></div>

    <!-- Add item bar -->
    <div class="px-6 pt-5 space-y-3">
      <div class="flex gap-2">
        <input id="urlInput" type="url" placeholder="Paste product URL…" class="flex-1 rounded-xl px-4 py-3 text-sm" />
        <button onclick="fetchUrl()" id="fetchBtn" class="btn-primary px-4 rounded-xl text-sm whitespace-nowrap flex items-center gap-2">
          Fetch
        </button>
      </div>
      <button onclick="openModal()" class="btn-ghost w-full py-2.5 rounded-xl text-sm">
        + Add manually
      </button>
    </div>

    <!-- Filters -->
    <div id="filters" class="px-6 pt-4 flex flex-wrap gap-2 hidden">
      <button onclick="setFilter('')" data-cat="" class="filter-pill active px-3 py-1 rounded-full">All</button>
    </div>

    <!-- Items list -->
    <main class="flex-1 px-6 pt-4 pb-24 space-y-3" id="itemsList">
      <div id="emptyState" class="text-center py-16 text-muted">
        <div class="font-display text-6xl mb-3 opacity-20">✦</div>
        <p class="text-sm">Your wishlist is empty</p>
        <p class="text-xs mt-1 opacity-60">Paste a URL above or add items manually</p>
      </div>
    </main>
  </div>

  <!-- ADD/EDIT MODAL -->
  <div id="modal" class="fixed inset-0 modal-overlay z-50 hidden flex items-end sm:items-center justify-center p-4">
    <div class="modal-box rounded-2xl w-full max-w-md p-6 space-y-4 slide-in">
      <div class="flex items-center justify-between mb-1">
        <h2 id="modalTitle" class="font-display text-xl">Add Item</h2>
        <button onclick="closeModal()" class="text-muted hover:text-paper text-2xl leading-none">&times;</button>
      </div>
      <div class="accent-line"></div>

      <input id="itemName" type="text" placeholder="Product name" class="w-full rounded-xl px-4 py-3 text-sm" />
      <input id="itemUrl" type="url" placeholder="Product URL (optional)" class="w-full rounded-xl px-4 py-3 text-sm" />
      <div class="flex gap-3">
        <input id="itemPrice" type="text" placeholder="Price (e.g. 49.99)" class="flex-1 rounded-xl px-4 py-3 text-sm" />
        <input id="itemCurrency" type="text" placeholder="GBP" value="GBP" class="w-20 rounded-xl px-3 py-3 text-sm text-center" />
      </div>
      <select id="itemCategory" class="w-full rounded-xl px-4 py-3 text-sm">
        <option value="">Category…</option>
        <option>Tech</option>
        <option>Clothing</option>
        <option>Home</option>
        <option>Books</option>
        <option>Beauty</option>
        <option>Sports</option>
        <option>Food</option>
        <option>Other</option>
      </select>
      <textarea id="itemNotes" placeholder="Notes (optional)" rows="2" class="w-full rounded-xl px-4 py-3 text-sm resize-none"></textarea>

      <input id="editingId" type="hidden" />
      <button onclick="saveItem()" id="saveBtn" class="btn-primary w-full rounded-xl py-3 text-sm flex items-center justify-center gap-2">
        Save Item
      </button>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-paper text-ink text-xs font-medium px-5 py-3 rounded-full shadow-xl opacity-0 pointer-events-none z-50">
    Saved!
  </div>

  <!-- ═══════════════════════════════════════════
       FIREBASE CONFIG — PASTE YOUR KEYS HERE
       ═══════════════════════════════════════════ -->
  <script type="module">
    // 1. Go to https://console.firebase.google.com
    // 2. Create a project → Add web app → copy the config object
    // 3. Replace the values below with your own
    // 4. In Firebase console: enable Email/Password auth + Firestore
    // 5. Set Firestore rules (see README / instructions at bottom of file)

    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyBSzSThI6G_CAMUeBay_SuEXGtFt4wSsmg",
      authDomain: "wishlist-71248.firebaseapp.com",
      projectId: "wishlist-71248",
      storageBucket: "wishlist-71248.firebasestorage.app",
      messagingSenderId: "232743351369",
      appId: "1:232743351369:web:7e10b547cfed05c1c4fb98",
      measurementId: "G-1KTEPRD1FL"
    };

    // ═══════════════════════════════════════════

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
      signOut as fbSignOut, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc, query, where, orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const app  = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // ─── Crypto helpers (AES-GCM via Web Crypto API) ───────────────────────
    let cryptoKey = null;

    async function deriveKey(masterPassword, uid) {
      const enc = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey(
        "raw", enc.encode(masterPassword), "PBKDF2", false, ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: enc.encode(uid), iterations: 200000, hash: "SHA-256" },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false, ["encrypt", "decrypt"]
      );
    }

    async function encrypt(text) {
      if (!cryptoKey || !text) return text;
      const enc = new TextEncoder();
      const iv  = crypto.getRandomValues(new Uint8Array(12));
      const buf = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, cryptoKey, enc.encode(text));
      const combined = new Uint8Array(iv.byteLength + buf.byteLength);
      combined.set(iv); combined.set(new Uint8Array(buf), iv.byteLength);
      return btoa(String.fromCharCode(...combined));
    }

    async function decrypt(b64) {
      if (!cryptoKey || !b64) return b64;
      try {
        const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        const iv  = bytes.slice(0, 12);
        const buf = bytes.slice(12);
        const dec = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, cryptoKey, buf);
        return new TextDecoder().decode(dec);
      } catch { return "[decryption failed — wrong master password?]"; }
    }

    // ─── Auth ───────────────────────────────────────────────────────────────
    let currentUser = null;

    window.switchTab = (tab) => {
      const isLogin = tab === 'login';
      document.getElementById('tabLogin').className    = `flex-1 py-2 text-sm font-medium transition-colors ${isLogin ? 'bg-white/8 text-paper' : 'text-muted'}`;
      document.getElementById('tabRegister').className = `flex-1 py-2 text-sm font-medium transition-colors ${!isLogin ? 'bg-white/8 text-paper' : 'text-muted'}`;
      document.getElementById('authBtn').textContent   = isLogin ? 'Sign In' : 'Create Account';
      document.getElementById('masterPwSection').style.display = isLogin ? '' : '';
    };

    window.handleAuth = async () => {
      const email  = document.getElementById('authEmail').value.trim();
      const pw     = document.getElementById('authPassword').value;
      const master = document.getElementById('masterPassword').value;
      const errEl  = document.getElementById('authError');
      const btn    = document.getElementById('authBtn');
      const isLogin = document.getElementById('tabLogin').classList.contains('text-paper');

      errEl.classList.add('hidden');
      if (!master) { errEl.textContent = 'Master password is required.'; errEl.classList.remove('hidden'); return; }

      btn.innerHTML = '<div class="spinner"></div>';
      btn.disabled  = true;

      try {
        let cred;
        if (isLogin) {
          cred = await signInWithEmailAndPassword(auth, email, pw);
        } else {
          cred = await createUserWithEmailAndPassword(auth, email, pw);
        }
        cryptoKey = await deriveKey(master, cred.user.uid);
      } catch (e) {
        errEl.textContent = e.message.replace('Firebase: ', '');
        errEl.classList.remove('hidden');
      } finally {
        btn.innerHTML = isLogin ? 'Sign In' : 'Create Account';
        btn.disabled  = false;
      }
    };

    window.signOut = async () => {
      cryptoKey = null;
      await fbSignOut(auth);
    };

    onAuthStateChanged(auth, user => {
      currentUser = user;
      if (user) {
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('appScreen').classList.remove('hidden');
        loadItems();
      } else {
        document.getElementById('authScreen').classList.remove('hidden');
        document.getElementById('appScreen').classList.add('hidden');
        document.getElementById('itemsList').innerHTML = '<div id="emptyState" class="text-center py-16 text-muted"><div class="font-display text-6xl mb-3 opacity-20">✦</div><p class="text-sm">Your wishlist is empty</p></div>';
      }
    });

    // ─── URL Fetching ────────────────────────────────────────────────────────
    window.fetchUrl = async () => {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) return;
      const btn = document.getElementById('fetchBtn');
      btn.innerHTML = '<div class="spinner" style="border-top-color:#0a0a0a;border-color:rgba(10,10,10,0.25)"></div>';
      btn.disabled = true;

      try {
        const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
        const res   = await fetch(proxy);
        const json  = await res.json();
        const html  = json.contents || '';
        const parser = new DOMParser();
        const doc2   = parser.parseFromString(html, 'text/html');

        const getMeta = (names) => {
          for (const n of names) {
            const el = doc2.querySelector(`meta[property="${n}"], meta[name="${n}"]`);
            if (el) return el.getAttribute('content') || '';
          }
          return '';
        };

        const name  = getMeta(['og:title','twitter:title']) || doc2.title || '';
        const price = getMeta(['og:price:amount','product:price:amount','price']) || '';
        const currency = getMeta(['og:price:currency','product:price:currency']) || 'GBP';
        const image = getMeta(['og:image','twitter:image']) || '';

        openModal({ name, url, price, currency, image });
      } catch (e) {
        showToast('Could not fetch URL — try manually', true);
        openModal({ url });
      } finally {
        btn.innerHTML = 'Fetch';
        btn.disabled  = false;
        document.getElementById('urlInput').value = '';
      }
    };

    // ─── Modal ───────────────────────────────────────────────────────────────
    window.openModal = (prefill = {}) => {
      document.getElementById('modalTitle').textContent = prefill.editId ? 'Edit Item' : 'Add Item';
      document.getElementById('itemName').value     = prefill.name     || '';
      document.getElementById('itemUrl').value      = prefill.url      || '';
      document.getElementById('itemPrice').value    = prefill.price    || '';
      document.getElementById('itemCurrency').value = prefill.currency || 'GBP';
      document.getElementById('itemCategory').value = prefill.category || '';
      document.getElementById('itemNotes').value    = prefill.notes    || '';
      document.getElementById('editingId').value    = prefill.editId   || '';
      document.getElementById('saveBtn').textContent = prefill.editId ? 'Update Item' : 'Save Item';
      document.getElementById('modal').classList.remove('hidden');
    };

    window.closeModal = () => document.getElementById('modal').classList.add('hidden');

    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === document.getElementById('modal')) closeModal();
    });

    // ─── CRUD ────────────────────────────────────────────────────────────────
    window.saveItem = async () => {
      const name     = document.getElementById('itemName').value.trim();
      const url      = document.getElementById('itemUrl').value.trim();
      const price    = document.getElementById('itemPrice').value.trim();
      const currency = document.getElementById('itemCurrency').value.trim() || 'GBP';
      const category = document.getElementById('itemCategory').value;
      const notes    = document.getElementById('itemNotes').value.trim();
      const editingId = document.getElementById('editingId').value;

      if (!name) { showToast('Name is required', true); return; }

      const btn = document.getElementById('saveBtn');
      btn.innerHTML = '<div class="spinner" style="border-top-color:#0a0a0a;border-color:rgba(10,10,10,0.25)"></div>';
      btn.disabled = true;

      try {
        const encName = await encrypt(name);
        const encUrl  = await encrypt(url);

        const payload = {
          encName, encUrl,
          price, currency, category, notes,
          uid: currentUser.uid,
          updatedAt: Date.now(),
        };

        if (editingId) {
          await updateDoc(doc(db, 'items', editingId), payload);
        } else {
          payload.createdAt = Date.now();
          await addDoc(collection(db, 'items'), payload);
        }

        closeModal();
        showToast(editingId ? 'Updated!' : 'Saved!');
        loadItems();
      } catch (e) {
        showToast('Error: ' + e.message, true);
      } finally {
        btn.textContent = editingId ? 'Update Item' : 'Save Item';
        btn.disabled = false;
      }
    };

    let allItems = [];
    let activeFilter = '';

    window.setFilter = (cat) => {
      activeFilter = cat;
      document.querySelectorAll('.filter-pill').forEach(p => {
        p.classList.toggle('active', p.dataset.cat === cat);
      });
      renderItems();
    };

    async function loadItems() {
      if (!currentUser) return;
      try {
        const q = query(
          collection(db, 'items'),
          where('uid', '==', currentUser.uid),
          orderBy('createdAt', 'desc')
        );
        const snap = await getDocs(q);
        const promises = snap.docs.map(async d => {
          const data = d.data();
          return {
            id: d.id,
            name: await decrypt(data.encName),
            url: await decrypt(data.encUrl),
            price: data.price,
            currency: data.currency,
            category: data.category,
            notes: data.notes,
            createdAt: data.createdAt,
          };
        });
        allItems = await Promise.all(promises);
        renderFilters();
        renderItems();
      } catch(e) {
        showToast('Error loading: ' + e.message, true);
      }
    }

    function renderFilters() {
      const cats = [...new Set(allItems.map(i => i.category).filter(Boolean))];
      const container = document.getElementById('filters');
      if (cats.length === 0) { container.classList.add('hidden'); return; }
      container.classList.remove('hidden');
      container.innerHTML = `<button onclick="setFilter('')" data-cat="" class="filter-pill ${activeFilter===''?'active':''} px-3 py-1 rounded-full">All</button>`;
      cats.forEach(c => {
        const btn = document.createElement('button');
        btn.onclick = () => setFilter(c);
        btn.dataset.cat = c;
        btn.className = `filter-pill ${activeFilter===c?'active':''} px-3 py-1 rounded-full`;
        btn.textContent = c;
        container.appendChild(btn);
      });
    }

    function renderItems() {
      const list = document.getElementById('itemsList');
      const filtered = activeFilter ? allItems.filter(i => i.category === activeFilter) : allItems;

      document.getElementById('itemCount').textContent = `${allItems.length} item${allItems.length !== 1 ? 's' : ''}`;

      if (filtered.length === 0) {
        list.innerHTML = `<div id="emptyState" class="text-center py-16 text-muted">
          <div class="font-display text-6xl mb-3 opacity-20">✦</div>
          <p class="text-sm">${allItems.length > 0 ? 'No items in this category' : 'Your wishlist is empty'}</p>
        </div>`;
        return;
      }

      list.innerHTML = filtered.map(item => `
        <div class="item-card rounded-2xl p-4 slide-in">
          <div class="flex items-start justify-between gap-3">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 flex-wrap mb-1">
                ${item.category ? `<span class="tag px-2 py-0.5 rounded-full">${item.category}</span>` : ''}
              </div>
              <h3 class="font-display text-base leading-snug">${escHtml(item.name)}</h3>
              ${item.price ? `<p class="text-accent text-sm font-medium mt-1">${escHtml(item.currency)} ${escHtml(item.price)}</p>` : ''}
              ${item.notes ? `<p class="text-muted text-xs mt-1.5 leading-relaxed">${escHtml(item.notes)}</p>` : ''}
              ${item.url ? `<a href="${escHtml(item.url)}" target="_blank" rel="noopener" class="text-xs text-muted hover:text-accent mt-2 inline-block truncate max-w-xs transition-colors">↗ View product</a>` : ''}
            </div>
            <div class="flex flex-col items-end gap-2 shrink-0">
              <button onclick='editItem(${JSON.stringify(item.id)})' class="text-muted hover:text-paper transition-colors text-xs">Edit</button>
              <button onclick='deleteItem(${JSON.stringify(item.id)})' class="text-muted hover:text-red-400 transition-colors text-xs">Delete</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    window.editItem = (id) => {
      const item = allItems.find(i => i.id === id);
      if (!item) return;
      openModal({ ...item, editId: id });
    };

    window.deleteItem = async (id) => {
      if (!confirm('Delete this item?')) return;
      await deleteDoc(doc(db, 'items', id));
      showToast('Deleted');
      loadItems();
    };

    // ─── Helpers ─────────────────────────────────────────────────────────────
    function escHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    let toastTimer;
    window.showToast = (msg, isError = false) => {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.style.background = isError ? '#ef4444' : '#f5f0eb';
      el.style.color       = isError ? '#fff' : '#0a0a0a';
      el.style.opacity     = '1';
      el.style.transform   = 'translateX(-50%) translateY(0)';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        el.style.opacity = '0';
        el.style.transform = 'translateX(-50%) translateY(8px)';
      }, 2500);
    };

    // ─── Service Worker ───────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
