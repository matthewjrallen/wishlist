<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Wishlist</title>

   <!-- PWA / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wishlist" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#080f0a" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
	
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Playfair Display', 'serif'],
            body: ['DM Sans', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <style>
    :root {
      --accent:     #4ade80;
      --accent-dim: rgba(74,222,128,0.12);
      --accent-mid: rgba(74,222,128,0.25);
      --bg:         #080f0a;
      --surface:    #0d1a0f;
      --paper:      #e8f0ea;
      --muted:      #5a7060;
      --border:     rgba(232,240,234,0.10);
    }

    * { -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--paper);
      min-height: 100vh;
    }

    #authScreen {
      background:
        radial-gradient(ellipse at 65% 0%,   #0d2b14 0%, transparent 55%),
        radial-gradient(ellipse at 10% 90%,  #091a0c 0%, transparent 50%),
        var(--bg);
    }
    #appScreen {
      background:
        radial-gradient(ellipse at 75% -5%, #0d2b14 0%, transparent 50%),
        var(--bg);
    }

    /* Glass card */
    .glass {
      background: rgba(232,240,234,0.04);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
    }

    /* Accent divider */
    .accent-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.4;
    }

    /* Inputs */
    input, textarea, select {
      background: rgba(232,240,234,0.05) !important;
      border: 1px solid rgba(232,240,234,0.13) !important;
      color: var(--paper) !important;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none !important;
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px rgba(74,222,128,0.08) !important;
    }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    select option { background: #0f1f12; color: var(--paper); }

    /* Buttons */
    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      font-weight: 600;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 0 22px rgba(74,222,128,0.18);
    }
    .btn-primary:hover  { opacity: 0.88; box-shadow: 0 0 32px rgba(74,222,128,0.30); }
    .btn-primary:active { transform: scale(0.97); }

    .btn-ghost {
      border: 1px solid rgba(232,240,234,0.18);
      color: var(--paper);
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* Item cards */
    .item-card {
      background: rgba(232,240,234,0.025);
      border: 1px solid rgba(232,240,234,0.07);
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .item-card:hover {
      border-color: var(--accent-mid);
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(74,222,128,0.06);
    }

    /* Tags */
    .tag {
      background: var(--accent-dim);
      border: 1px solid var(--accent-mid);
      color: var(--accent);
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Animations */
    .slide-in { animation: slideIn 0.28s ease forwards; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Modal */
    .modal-overlay {
      background: rgba(8,15,10,0.88);
      backdrop-filter: blur(10px);
    }
    .modal-box {
      background: var(--surface);
      border: 1px solid rgba(232,240,234,0.10);
      box-shadow: 0 28px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(74,222,128,0.04);
    }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(8,15,10,0.25);
      border-top-color: var(--bg);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Filter pills */
    .filter-pill {
      border: 1px solid rgba(232,240,234,0.13);
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }
    .filter-pill.active, .filter-pill:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* Custom category row */
    #customCatRow { display: none; }
    #customCatRow.visible { display: flex; }

    /* Glow dot */
    .glow-dot {
      display: inline-block;
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent), 0 0 18px rgba(74,222,128,0.35);
      margin-right: 8px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    /* Toast */
    #toast { transition: opacity 0.3s, transform 0.3s; }
  </style>
</head>
<body>

  <!-- ═══ AUTH SCREEN ════════════════════════════════════════════════════════ -->
  <div id="authScreen" class="min-h-screen flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-sm">

      <div class="text-center mb-10">
        <h1 class="font-display text-5xl mb-2 tracking-tight">
          <span class="glow-dot"></span>Wishlist
        </h1>
        <p class="text-sm" style="color:var(--muted)">Your private collection</p>
        <div class="accent-line mt-4 mx-auto w-24"></div>
      </div>

      <div class="glass rounded-2xl p-6 space-y-4">
        <!-- Sign In / Register tabs -->
        <div class="flex rounded-xl overflow-hidden" style="border:1px solid rgba(255,255,255,0.08)">
          <button id="tabLogin" onclick="switchTab('login')"
            class="flex-1 py-2.5 text-sm font-medium transition-colors"
            style="background:rgba(255,255,255,0.05);color:var(--paper)">Sign In</button>
          <button id="tabRegister" onclick="switchTab('register')"
            class="flex-1 py-2.5 text-sm font-medium transition-colors"
            style="color:var(--muted)">Register</button>
        </div>

        <div id="authError"
          class="text-red-400 text-xs text-center hidden rounded-xl py-2.5 px-3"
          style="background:rgba(248,113,113,0.08)"></div>

        <input id="authEmail"    type="email"    placeholder="Email"    class="w-full rounded-xl px-4 py-3 text-sm" />
        <input id="authPassword" type="password" placeholder="Password" class="w-full rounded-xl px-4 py-3 text-sm" />

        <p class="text-xs leading-relaxed px-1" style="color:var(--muted)">
          🔒 Your password also encrypts your data client-side and is
          <strong style="color:var(--paper)">never</strong> stored or sent to anyone.
        </p>

        <button id="authBtn" onclick="handleAuth()"
          class="btn-primary w-full rounded-xl py-3 text-sm flex items-center justify-center gap-2">
          Sign In
        </button>
      </div>

      <p class="text-xs text-center mt-6 leading-relaxed" style="color:var(--muted)">
        ⚙️ Paste your Firebase config in the
        <code style="color:var(--accent)">FIREBASE_CONFIG</code> section in the file
      </p>
    </div>
  </div>

  <!-- ═══ APP SCREEN ═════════════════════════════════════════════════════════ -->
  <div id="appScreen" class="hidden min-h-screen flex flex-col max-w-2xl mx-auto">

    <header class="px-6 pt-14 pb-4 flex items-center justify-between">
      <div>
        <h1 class="font-display text-3xl tracking-tight">
          <span class="glow-dot"></span>Wishlist
        </h1>
        <p id="itemCount" class="text-xs mt-0.5 pl-4" style="color:var(--muted)">0 items</p>
      </div>
      <button onclick="signOut()" class="btn-ghost text-xs px-4 py-2 rounded-full">Sign out</button>
    </header>

    <div class="accent-line mx-6"></div>

    <!-- Add button -->
    <div class="px-6 pt-5">
      <button onclick="openModal()"
        class="btn-primary w-full py-3 rounded-xl text-sm flex items-center justify-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none"
          viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
        Add Item
      </button>
    </div>

    <!-- Category filter pills -->
    <div id="filters" class="px-6 pt-4 flex flex-wrap gap-2 hidden"></div>

    <!-- Items list -->
    <main id="itemsList" class="flex-1 px-6 pt-4 pb-28 space-y-3">
      <div class="text-center py-16" style="color:var(--muted)">
        <div class="font-display text-6xl mb-3 opacity-20">✦</div>
        <p class="text-sm">Your wishlist is empty</p>
        <p class="text-xs mt-1 opacity-60">Tap Add Item to get started</p>
      </div>
    </main>
  </div>

  <!-- ═══ ADD / EDIT MODAL ═══════════════════════════════════════════════════ -->
  <div id="modal"
    class="fixed inset-0 modal-overlay z-50 hidden flex items-end sm:items-center justify-center p-4">
    <div class="modal-box rounded-2xl w-full max-w-md p-6 space-y-4 slide-in">

      <div class="flex items-center justify-between mb-1">
        <h2 id="modalTitle" class="font-display text-xl">Add Item</h2>
        <button onclick="closeModal()"
          class="text-2xl leading-none transition-colors"
          style="color:var(--muted)"
          onmouseover="this.style.color='var(--paper)'"
          onmouseout="this.style.color='var(--muted)'">&times;</button>
      </div>
      <div class="accent-line"></div>

      <input id="itemName"     type="text" placeholder="Product name *"          class="w-full rounded-xl px-4 py-3 text-sm" />
      <input id="itemUrl"      type="url"  placeholder="Product URL (optional)"  class="w-full rounded-xl px-4 py-3 text-sm" />

      <div class="flex gap-3">
        <input id="itemPrice"    type="text" placeholder="Price (e.g. 49.99)"    class="flex-1 rounded-xl px-4 py-3 text-sm" />
        <input id="itemCurrency" type="text" placeholder="GBP" value="GBP"       class="w-20 rounded-xl px-3 py-3 text-sm text-center" />
      </div>

      <!-- Category: preset dropdown + custom input -->
      <div class="space-y-2">
        <select id="itemCategory" onchange="handleCategoryChange()"
          class="w-full rounded-xl px-4 py-3 text-sm">
          <option value="">Category…</option>
          <option>Tech</option>
          <option>Clothing</option>
          <option>Home</option>
          <option>Books</option>
          <option>Beauty</option>
          <option>Sports</option>
          <option>Food</option>
          <option>Travel</option>
          <option>Other</option>
          <option value="__custom__">+ Custom category…</option>
        </select>

        <div id="customCatRow" class="flex gap-2">
          <input id="customCatInput" type="text" placeholder="Enter category name"
            class="flex-1 rounded-xl px-4 py-3 text-sm"
            onkeydown="if(event.key==='Enter'){event.preventDefault();confirmCustomCat();}" />
          <button onclick="confirmCustomCat()"
            class="btn-primary px-4 rounded-xl text-sm whitespace-nowrap">Add</button>
        </div>
      </div>

      <textarea id="itemNotes" placeholder="Notes (optional)"
        rows="2" class="w-full rounded-xl px-4 py-3 text-sm resize-none"></textarea>

      <input id="editingId" type="hidden" />
      <button onclick="saveItem()" id="saveBtn"
        class="btn-primary w-full rounded-xl py-3 text-sm flex items-center justify-center gap-2">
        Save Item
      </button>
    </div>
  </div>

  <!-- ═══ TOAST ═════════════════════════════════════════════════════════════ -->
  <div id="toast"
    class="fixed bottom-8 left-1/2 -translate-x-1/2 text-xs font-semibold px-5 py-3 rounded-full shadow-2xl opacity-0 pointer-events-none z-50 whitespace-nowrap"
    style="background:var(--accent);color:var(--bg)">
    Saved!
  </div>

  <!-- ═══════════════════════════════════════════════════════════════════════
       FIREBASE CONFIG — PASTE YOUR KEYS HERE
       ═══════════════════════════════════════════════════════════════════════ -->
  <script type="module">
    // 1. Go to https://console.firebase.google.com
    // 2. Create a project → Add web app → copy the config object
    // 3. Replace the placeholder values below
    // 4. Enable Email/Password auth + Firestore in the Firebase console

    const FIREBASE_CONFIG = {
		apiKey: "AIzaSyBSzSThI6G_CAMUeBay_SuEXGtFt4wSsmg",
		authDomain: "wishlist-71248.firebaseapp.com",
		projectId: "wishlist-71248",
		storageBucket: "wishlist-71248.firebasestorage.app",
		messagingSenderId: "232743351369",
		appId: "1:232743351369:web:7e10b547cfed05c1c4fb98",
		measurementId: "G-1KTEPRD1FL"
	};

    // ═══════════════════════════════════════════════════════════════════════

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
      signOut as fbSignOut, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore, collection, addDoc, getDocs,
      doc, deleteDoc, updateDoc, query, where
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const app  = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // ─── Web Crypto helpers (AES-256-GCM) ────────────────────────────────────
    let cryptoKey = null;

    async function deriveKey(masterPassword, uid) {
      const enc = new TextEncoder();
      const raw = await crypto.subtle.importKey(
        "raw", enc.encode(masterPassword), "PBKDF2", false, ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: enc.encode(uid), iterations: 200000, hash: "SHA-256" },
        raw,
        { name: "AES-GCM", length: 256 },
        false, ["encrypt", "decrypt"]
      );
    }

    async function encrypt(text) {
      if (!cryptoKey || !text) return text;
      const enc = new TextEncoder();
      const iv  = crypto.getRandomValues(new Uint8Array(12));
      const buf = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, cryptoKey, enc.encode(text));
      const out = new Uint8Array(12 + buf.byteLength);
      out.set(iv); out.set(new Uint8Array(buf), 12);
      return btoa(String.fromCharCode(...out));
    }

    async function decrypt(b64) {
      if (!cryptoKey || !b64) return b64;
      try {
        const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        const dec   = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: bytes.slice(0, 12) }, cryptoKey, bytes.slice(12)
        );
        return new TextDecoder().decode(dec);
      } catch { return "[decryption failed — wrong master password?]"; }
    }

    // ─── Auth ─────────────────────────────────────────────────────────────────
    let currentUser = null;

    window.switchTab = (tab) => {
      const isLogin = tab === 'login';
      const tl = document.getElementById('tabLogin');
      const tr = document.getElementById('tabRegister');
      tl.style.color      = isLogin  ? 'var(--paper)' : 'var(--muted)';
      tr.style.color      = !isLogin ? 'var(--paper)' : 'var(--muted)';
      tl.style.background = isLogin  ? 'rgba(255,255,255,0.05)' : '';
      tr.style.background = !isLogin ? 'rgba(255,255,255,0.05)' : '';
      document.getElementById('authBtn').textContent = isLogin ? 'Sign In' : 'Create Account';
    };

    window.handleAuth = async () => {
      const email  = document.getElementById('authEmail').value.trim();
      const pw     = document.getElementById('authPassword').value;
      const errEl  = document.getElementById('authError');
      const btn    = document.getElementById('authBtn');
      const isLogin = btn.textContent.trim() === 'Sign In';

      errEl.classList.add('hidden');
      if (!pw) {
        errEl.textContent = 'Password is required.';
        errEl.classList.remove('hidden');
        return;
      }

      btn.innerHTML = '<div class="spinner"></div>';
      btn.disabled  = true;

      try {
        const cred = isLogin
          ? await signInWithEmailAndPassword(auth, email, pw)
          : await createUserWithEmailAndPassword(auth, email, pw);
        // Use the login password itself as the encryption key source
        cryptoKey = await deriveKey(pw, cred.user.uid);
      } catch (e) {
        errEl.textContent = e.message.replace('Firebase: ','').replace(/\(auth\/.*?\)\.?/,'').trim();
        errEl.classList.remove('hidden');
      } finally {
        btn.textContent = isLogin ? 'Sign In' : 'Create Account';
        btn.disabled = false;
      }
    };

    window.signOut = async () => {
      cryptoKey = null;
      await fbSignOut(auth);
    };

    onAuthStateChanged(auth, user => {
      currentUser = user;
      document.getElementById('authScreen').classList.toggle('hidden',  !!user);
      document.getElementById('appScreen').classList.toggle('hidden',   !user);
      if (user) loadItems();
    });

    // ─── Custom category management ───────────────────────────────────────────
    const sessionCustomCats = new Set();

    window.handleCategoryChange = () => {
      const sel = document.getElementById('itemCategory');
      const row = document.getElementById('customCatRow');
      if (sel.value === '__custom__') {
        row.classList.add('visible');
        document.getElementById('customCatInput').focus();
      } else {
        row.classList.remove('visible');
      }
    };

    window.confirmCustomCat = () => {
      const input = document.getElementById('customCatInput');
      const val   = input.value.trim();
      if (!val) { input.focus(); return; }
      addCustomCatToDropdown(val);
      document.getElementById('itemCategory').value = val;
      input.value = '';
      document.getElementById('customCatRow').classList.remove('visible');
    };

    function addCustomCatToDropdown(val) {
      if (sessionCustomCats.has(val)) return;
      sessionCustomCats.add(val);
      const sel    = document.getElementById('itemCategory');
      const exists = [...sel.options].some(o => o.value === val);
      if (!exists) {
        const opt    = new Option(val, val);
        const anchor = sel.querySelector('option[value="__custom__"]');
        sel.insertBefore(opt, anchor);
      }
    }

    // ─── Modal ────────────────────────────────────────────────────────────────
    window.openModal = (prefill = {}) => {
      document.getElementById('modalTitle').textContent      = prefill.editId ? 'Edit Item' : 'Add Item';
      document.getElementById('itemName').value              = prefill.name     || '';
      document.getElementById('itemUrl').value               = prefill.url      || '';
      document.getElementById('itemPrice').value             = prefill.price    || '';
      document.getElementById('itemCurrency').value          = prefill.currency || 'GBP';
      document.getElementById('itemNotes').value             = prefill.notes    || '';
      document.getElementById('editingId').value             = prefill.editId   || '';
      document.getElementById('saveBtn').textContent         = prefill.editId ? 'Update Item' : 'Save Item';
      document.getElementById('customCatRow').classList.remove('visible');

      const sel = document.getElementById('itemCategory');
      const cat = prefill.category || '';
      if (cat) addCustomCatToDropdown(cat);
      sel.value = cat;

      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('itemName').focus();
    };

    window.closeModal = () => document.getElementById('modal').classList.add('hidden');

    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === document.getElementById('modal')) closeModal();
    });

    // ─── Save ─────────────────────────────────────────────────────────────────
    window.saveItem = async () => {
      const name      = document.getElementById('itemName').value.trim();
      const url       = document.getElementById('itemUrl').value.trim();
      const price     = document.getElementById('itemPrice').value.trim();
      const currency  = document.getElementById('itemCurrency').value.trim() || 'GBP';
      const notes     = document.getElementById('itemNotes').value.trim();
      const editingId = document.getElementById('editingId').value;

      let category = document.getElementById('itemCategory').value;
      if (category === '__custom__') {
        category = document.getElementById('customCatInput').value.trim();
        if (!category) { showToast('Enter a category name first', true); return; }
      }

      if (!name) { showToast('Name is required', true); return; }

      const btn = document.getElementById('saveBtn');
      btn.innerHTML = '<div class="spinner" style="border-top-color:var(--bg);border-color:rgba(8,15,10,0.2)"></div>';
      btn.disabled  = true;

      try {
        const payload = {
          encName: await encrypt(name),
          encUrl:  await encrypt(url),
          price, currency, category, notes,
          uid: currentUser.uid,
          updatedAt: Date.now(),
        };

        if (editingId) {
          await updateDoc(doc(db, 'items', editingId), payload);
        } else {
          payload.createdAt = Date.now();
          await addDoc(collection(db, 'items'), payload);
        }

        closeModal();
        showToast(editingId ? 'Updated!' : 'Saved!');
        loadItems();
      } catch (e) {
        showToast('Error: ' + e.message, true);
      } finally {
        btn.textContent = editingId ? 'Update Item' : 'Save Item';
        btn.disabled    = false;
      }
    };

    // ─── Load & render ────────────────────────────────────────────────────────
    let allItems     = [];
    let activeFilter = '';

    window.setFilter = (cat) => {
      activeFilter = cat;
      document.querySelectorAll('.filter-pill').forEach(p =>
        p.classList.toggle('active', p.dataset.cat === cat)
      );
      renderItems();
    };

    async function loadItems() {
      if (!currentUser) return;
      try {
        const snap = await getDocs(
          query(collection(db, 'items'), where('uid', '==', currentUser.uid))
        );
        const raw = await Promise.all(snap.docs.map(async d => {
          const data = d.data();
          return {
            id:        d.id,
            name:      await decrypt(data.encName),
            url:       await decrypt(data.encUrl),
            price:     data.price,
            currency:  data.currency,
            category:  data.category,
            notes:     data.notes,
            createdAt: data.createdAt || 0,
          };
        }));
        allItems = raw.sort((a, b) => b.createdAt - a.createdAt);

        // Sync any custom categories from Firestore into the dropdown
        const preset = new Set(['Tech','Clothing','Home','Books','Beauty','Sports','Food','Travel','Other','']);
        allItems.forEach(item => {
          if (item.category && !preset.has(item.category)) addCustomCatToDropdown(item.category);
        });

        renderFilters();
        renderItems();
      } catch(e) {
        showToast('Error loading: ' + e.message, true);
      }
    }

    function renderFilters() {
      const cats      = [...new Set(allItems.map(i => i.category).filter(Boolean))];
      const container = document.getElementById('filters');
      if (!cats.length) { container.classList.add('hidden'); return; }
      container.classList.remove('hidden');
      container.innerHTML =
        `<button onclick="setFilter('')" data-cat="" class="filter-pill ${activeFilter===''?'active':''} px-3 py-1.5 rounded-full">All</button>`;
      cats.forEach(c => {
        const btn       = document.createElement('button');
        btn.onclick     = () => setFilter(c);
        btn.dataset.cat = c;
        btn.className   = `filter-pill ${activeFilter===c?'active':''} px-3 py-1.5 rounded-full`;
        btn.textContent = c;
        container.appendChild(btn);
      });
    }

    function renderItems() {
      const list     = document.getElementById('itemsList');
      const filtered = activeFilter ? allItems.filter(i => i.category === activeFilter) : allItems;

      document.getElementById('itemCount').textContent =
        `${allItems.length} item${allItems.length !== 1 ? 's' : ''}`;

      if (!filtered.length) {
        list.innerHTML = `
          <div class="text-center py-16" style="color:var(--muted)">
            <div class="font-display text-6xl mb-3 opacity-20">✦</div>
            <p class="text-sm">${allItems.length ? 'No items in this category' : 'Your wishlist is empty'}</p>
            ${!allItems.length ? '<p class="text-xs mt-1 opacity-60">Tap Add Item to get started</p>' : ''}
          </div>`;
        return;
      }

      list.innerHTML = filtered.map(item => `
        <div class="item-card rounded-2xl p-4 slide-in">
          <div class="flex items-start justify-between gap-3">
            <div class="flex-1 min-w-0">
              ${item.category
                ? `<span class="tag px-2 py-0.5 rounded-full inline-block mb-1.5">${escHtml(item.category)}</span>`
                : ''}
              <h3 class="font-display text-base leading-snug">${escHtml(item.name)}</h3>
              ${item.price
                ? `<p class="text-sm font-medium mt-1" style="color:var(--accent)">${escHtml(item.currency)} ${escHtml(item.price)}</p>`
                : ''}
              ${item.notes
                ? `<p class="text-xs mt-1.5 leading-relaxed" style="color:var(--muted)">${escHtml(item.notes)}</p>`
                : ''}
              ${item.url
                ? `<a href="${escHtml(item.url)}" target="_blank" rel="noopener"
                     class="text-xs mt-2 inline-block truncate max-w-xs transition-colors"
                     style="color:var(--muted)"
                     onmouseover="this.style.color='var(--accent)'"
                     onmouseout="this.style.color='var(--muted)'">↗ View product</a>`
                : ''}
            </div>
            <div class="flex flex-col items-end gap-2 shrink-0 pt-0.5">
              <button onclick='editItem(${JSON.stringify(item.id)})'
                class="text-xs transition-colors" style="color:var(--muted)"
                onmouseover="this.style.color='var(--paper)'"
                onmouseout="this.style.color='var(--muted)'">Edit</button>
              <button onclick='deleteItem(${JSON.stringify(item.id)})'
                class="text-xs transition-colors" style="color:var(--muted)"
                onmouseover="this.style.color='#f87171'"
                onmouseout="this.style.color='var(--muted)'">Delete</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    window.editItem = (id) => {
      const item = allItems.find(i => i.id === id);
      if (item) openModal({ ...item, editId: id });
    };

    window.deleteItem = async (id) => {
      if (!confirm('Delete this item?')) return;
      await deleteDoc(doc(db, 'items', id));
      showToast('Deleted');
      loadItems();
    };

    // ─── Helpers ──────────────────────────────────────────────────────────────
    function escHtml(str) {
      return String(str||'')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    let toastTimer;
    window.showToast = (msg, isError = false) => {
      const el         = document.getElementById('toast');
      el.textContent   = msg;
      el.style.background = isError ? '#ef4444' : 'var(--accent)';
      el.style.color      = 'var(--bg)';
      el.style.opacity    = '1';
      el.style.transform  = 'translateX(-50%) translateY(0)';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        el.style.opacity   = '0';
        el.style.transform = 'translateX(-50%) translateY(8px)';
      }, 2500);
    };

    // ─── Service Worker ───────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>

   c) Paste values into FIREBASE_CONFIG in the <script> tag
   d) Authentication → Sign-in method → enable Email/Password
   e) Firestore → Create database (production mode)
   f) Set Firestore Security Rules:

      rules_version = '2';
      service cloud.firestore {
        match /databases/{database}/documents {
          match /items/{itemId} {
            allow read, write: if request.auth != null
              && request.auth.uid == resource.data.uid;
            allow create: if request.auth != null
              && request.resource.data.uid == request.auth.uid;
          }
        }
      }

   b) Repo Settings → Pages → Source: main / root
   c) Live at: https://yourusername.github.io/your-repo/

3. ENCRYPTION
   - Your login password doubles as the encryption key source
   - PBKDF2 (200k iterations, salted with your Firebase UID) → AES-256-GCM key
   - The password is never stored or sent — only used locally to derive the key
   - Name & URL are encrypted; price/category stay plaintext (needed for filtering)
   - One password to remember — if you change/reset it, existing encrypted data
     will become unreadable (re-encrypt by editing and re-saving each item)

4. CUSTOM CATEGORIES
   - Choose "+ Custom category…" in the dropdown
